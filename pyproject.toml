# Tooling config for the scaffold's own verification gate (ruff + mypy).
# This is NOT a packaging manifest — the scaffold runs in place, it is not
# pip-installed. The only reason this file exists is to hold the lint/type
# strictness that scripts/verify-before-ship.ps1 enforces, so a vendor-verbatim
# primitive (app/tray/single_instance.py) passes what every consumer enforces
# BEFORE it ships. See project-scaffolding#50. Pytest config stays in pytest.ini.

[tool.ruff]
# Match the documented CI floor (CLAUDE.md → "GitHub Actions CI conventions").
target-version = "py312"

[tool.ruff.lint]
# Ruff's default rule set (E4/E7/E9, F) PLUS pyupgrade (UP) — extend-select keeps
# the defaults intact and adds UP, which is the fleet's baseline strictness.
extend-select = ["UP"]

[tool.mypy]
# `mypy --strict` is what consumers run on vendored modules; the scaffold gates
# its own canonical primitives identically. The verify script passes the exact
# files (the vendor-verbatim list) — this only supplies the strictness.
strict = true
