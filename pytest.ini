[pytest]
testpaths = tests
python_files = test_*.py
# Put the repo root on sys.path so tests can `from src... import ...` and
# `tests/e2e/conftest.py` can reach `tests/_streamlit_lifecycle.py`.
pythonpath = .
markers =
    slow: spawns/kills real OS processes (e.g. the tray behavioral harness) -- runs in the default suite, not filtered by CI.
